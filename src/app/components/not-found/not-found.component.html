<div class="not-found-container">
  <div class="not-found-content">
    <div class="error-code">404</div>
    <h1>Page Not Found</h1>
    <p class="error-message">Sorry, the page you're looking for doesn't exist or has been moved.</p>
    <p class="error-details">We couldn't find what you were looking for at <strong>{{ currentPath }}</strong></p>
    <button class="btn btn-primary btn-lg mt-4" (click)="goHome()">
      <i class="bi bi-house"></i> Back to Home
    </button>
    
  </div>
</div>
